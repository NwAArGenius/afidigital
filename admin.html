<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration - AFI Digital Academy</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #FF5722;      
            --primary-dark: #E64A19; 
            --accent: #FFB300;       
            --black: #111111;        
            --white: #FFFFFF;        
            --bg-light: #F4F6F9;     
            --text-regular: #333333; 
            
            --font-title: 'Montserrat', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            
            --transition: all 0.3s ease;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --border-radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-light);
            color: var(--text-regular);
            display: flex;
            min-height: 100vh;
        }

        h1, h2, h3, h4 {
            font-family: var(--font-title);
            color: var(--black);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--black);
            color: var(--white);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .brand img {
            max-width: 150px;
            margin-bottom: 40px;
            display: block;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 10px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            color: #aaa;
            transition: var(--transition);
            font-weight: 500;
        }

        .nav-link.active, .nav-link:hover {
            background-color: rgba(255, 87, 34, 0.1);
            color: var(--primary);
        }

        .nav-link.active i, .nav-link:hover i {
            color: var(--primary);
        }

        .nav-link i {
            width: 20px;
            height: 20px;
            color: #aaa;
        }

        .btn-logout {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            border-radius: var(--border-radius);
            color: #ff4d4d;
            transition: var(--transition);
            background: rgba(255, 77, 77, 0.1);
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: var(--font-body);
            width: 100%;
        }

        .btn-logout:hover {
            background: rgba(255, 77, 77, 0.2);
        }

        /* Main Content */
        .main-content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px 50px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 1.8rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            font-family: var(--font-title);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            gap: 10px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Table Card */
        .card {
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 30px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid #efefef;
        }

        th {
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        td {
            font-size: 0.95rem;
        }

        .formation-icon-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background-color: rgba(255, 87, 34, 0.1);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .formation-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .formation-title {
            font-weight: 700;
            font-family: var(--font-title);
            color: var(--black);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background-color: rgba(255, 87, 34, 0.1);
            color: var(--primary);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: var(--font-title);
            text-transform: uppercase;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-edit {
            background-color: rgba(255, 179, 0, 0.15);
            color: #D48806;
        }
        .btn-edit:hover {
            background-color: rgba(255, 179, 0, 0.3);
        }

        .btn-delete {
            background-color: rgba(255, 77, 77, 0.1);
            color: #ff4d4d;
        }
        .btn-delete:hover {
            background-color: rgba(255, 77, 77, 0.2);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(3px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background-color: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            padding: 40px;
            position: relative;
            transform: translateY(30px) scale(0.95);
            transition: var(--transition);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
        }
        .modal-close:hover { color: var(--black); }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: var(--font-title);
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: var(--transition);
            background-color: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--white);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .lucide-link {
            font-size: 0.8rem;
            color: var(--primary);
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="brand">
            <img src="logo.png" alt="AFI Logo" onerror="this.src=''; this.alt='AFI ADMIN'">
        </a>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <i data-lucide="book-open"></i>
                    Gestion Formations
                </a>
            </li>
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i data-lucide="external-link"></i>
                    Voir le site
                </a>
            </li>
        </ul>
        <button class="btn-logout" onclick="window.location.href='index.html'">
            <i data-lucide="log-out"></i>
            Quitter
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div>
                <h1>Formations</h1>
                <p>Gérez les bootcamps affichés sur le site web.</p>
            </div>
            <button class="btn btn-primary" id="btn-add-formation">
                <i data-lucide="plus"></i>
                Nouvelle Formation
            </button>
        </div>

        <div class="card">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Formation</th>
                            <th>Niveau</th>
                            <th>Durée</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="formations-table-body">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Form -->
    <div class="modal-overlay" id="formationModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Ajouter une formation</h3>
                <button class="modal-close" id="btnCloseModal"><i data-lucide="x"></i></button>
            </div>
            <form id="formationForm">
                <input type="hidden" id="formationId">
                <div class="form-group">
                    <label for="fTitle">Titre de la formation *</label>
                    <input type="text" id="fTitle" class="form-control" required placeholder="Ex: Développement Web">
                </div>
                <div class="form-group">
                    <label for="fShort">Description Courte *</label>
                    <input type="text" id="fShort" class="form-control" required placeholder="1 phrase accrocheuse" maxlength="100">
                </div>
                <div class="form-group">
                    <label for="fLong">Description Détaillée *</label>
                    <textarea id="fLong" class="form-control" required placeholder="Description complète du programme..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="fLevel">Niveau *</label>
                        <select id="fLevel" class="form-control" required>
                            <option value="Débutant">Débutant</option>
                            <option value="Intermédiaire">Intermédiaire</option>
                            <option value="Avancé">Avancé</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fDuration">Durée *</label>
                        <input type="text" id="fDuration" class="form-control" required placeholder="Ex: 8 Semaines">
                    </div>
                </div>
                <div class="form-group">
                    <label for="fIcon">Icône (Nom Lucide) * <a href="https://lucide.dev/icons" target="_blank" class="lucide-link">Trouver des icônes</a></label>
                    <input type="text" id="fIcon" class="form-control" required placeholder="Ex: code, target, pen-tool, cpu">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Enregistrer</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/formations.js"></script>
    <script>
        lucide.createIcons();

        const tableBody = document.getElementById('formations-table-body');
        const modal = document.getElementById('formationModal');
        const btnAdd = document.getElementById('btn-add-formation');
        const btnClose = document.getElementById('btnCloseModal');
        const form = document.getElementById('formationForm');
        const modalTitle = document.getElementById('modal-title');

        // Form Fields
        const fId = document.getElementById('formationId');
        const fTitle = document.getElementById('fTitle');
        const fShort = document.getElementById('fShort');
        const fLong = document.getElementById('fLong');
        const fLevel = document.getElementById('fLevel');
        const fDuration = document.getElementById('fDuration');
        const fIcon = document.getElementById('fIcon');

        function renderTable() {
            const formations = FormationsManager.getAll();
            tableBody.innerHTML = '';

            formations.forEach(f => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div class="formation-info">
                            <div class="formation-icon-preview">
                                <i data-lucide="${f.icon}"></i>
                            </div>
                            <div>
                                <div class="formation-title">${f.title}</div>
                                <div style="font-size: 0.85rem; color: #666;">${f.shortDescription}</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge">${f.level}</span></td>
                    <td><strong>${f.duration}</strong></td>
                    <td>
                        <div class="actions">
                            <button class="btn-icon btn-edit" onclick="editFormation('${f.id}')" title="Modifier">
                                <i data-lucide="edit-2" style="width:18px;"></i>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteFormation('${f.id}')" title="Supprimer">
                                <i data-lucide="trash-2" style="width:18px;"></i>
                            </button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            lucide.createIcons(); // RE-render icons for new elements
        }

        // Open Modal Add
        btnAdd.addEventListener('click', () => {
            form.reset();
            fId.value = '';
            modalTitle.textContent = 'Ajouter une formation';
            modal.classList.add('active');
        });

        // Close Modal
        btnClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // Edit
        window.editFormation = (id) => {
            const f = FormationsManager.getById(id);
            if(f) {
                fId.value = f.id;
                fTitle.value = f.title;
                fShort.value = f.shortDescription;
                fLong.value = f.longDescription;
                fLevel.value = f.level;
                fDuration.value = f.duration;
                fIcon.value = f.icon;
                
                modalTitle.textContent = 'Modifier la formation';
                modal.classList.add('active');
            }
        };

        // Delete
        window.deleteFormation = (id) => {
            if(confirm('Êtes-vous sûr de vouloir supprimer cette formation ?')) {
                FormationsManager.delete(id);
                renderTable();
            }
        };

        // Submit
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                title: fTitle.value,
                shortDescription: fShort.value,
                longDescription: fLong.value,
                level: fLevel.value,
                duration: fDuration.value,
                icon: fIcon.value || 'book' // fallback
            };

            if (fId.value) {
                FormationsManager.update(fId.value, data);
            } else {
                FormationsManager.create(data);
            }

            modal.classList.remove('active');
            renderTable();
        });

        // Init
        renderTable();
    </script>
</body>
</html>
